name: Fetch World Cup Scores

on:
  schedule:
    # Every 15 minutes during match days (11:00-05:00 UTC covers all ET match windows)
    - cron: '*/15 11-23,0-5 * 6-7 *'
  workflow_dispatch: # Manual trigger

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch scores
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: node scripts/fetch-scores.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || (git commit -m "Update scores $(date -u +%Y-%m-%dT%H:%M)" && git push)
