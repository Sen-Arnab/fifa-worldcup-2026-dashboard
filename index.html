<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIFA World Cup 2026 ⚽</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0f;--card:#12121a;--card-hover:#1a1a2e;--border:#1e1e2e;--accent:#8b5cf6;--accent2:#06b6d4;--gold:#f59e0b;--text:#f1f5f9;--dim:#64748b;--live:#ef4444;--done:#10b981;--soon:#3b82f6;--glow:0 0 30px rgba(139,92,246,0.15)}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle at 30% 20%,rgba(139,92,246,0.05) 0%,transparent 50%),radial-gradient(circle at 70% 80%,rgba(6,182,212,0.05) 0%,transparent 50%);pointer-events:none;z-index:0}

.header{position:relative;padding:3rem 1.5rem 2rem;text-align:center;overflow:hidden}
.header::after{content:'';position:absolute;bottom:0;left:10%;right:10%;height:1px;background:linear-gradient(90deg,transparent,var(--accent),var(--accent2),transparent)}
.logo{font-size:3.5rem;margin-bottom:0.5rem;filter:drop-shadow(0 0 20px rgba(245,158,11,0.4))}
.header h1{font-size:2.5rem;font-weight:900;letter-spacing:-1px;background:linear-gradient(135deg,#fff 0%,#8b5cf6 50%,#06b6d4 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header .sub{color:var(--dim);font-size:0.9rem;margin-top:0.5rem;font-weight:400;letter-spacing:2px;text-transform:uppercase}
.host-flags{margin-top:1rem;display:flex;justify-content:center;gap:0.5rem;font-size:1.5rem}

.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;max-width:700px;margin:2rem auto;padding:0 1.5rem}
.stat{background:linear-gradient(135deg,var(--card),var(--card-hover));border:1px solid var(--border);border-radius:16px;padding:1.2rem;text-align:center;transition:all 0.3s}
.stat:hover{border-color:var(--accent);box-shadow:var(--glow);transform:translateY(-2px)}
.stat .val{font-size:2rem;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stat .lbl{font-size:0.7rem;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-top:0.2rem}

.filters{display:flex;gap:0.4rem;padding:1.5rem;overflow-x:auto;justify-content:center;flex-wrap:wrap;max-width:1000px;margin:0 auto}
.filters::-webkit-scrollbar{display:none}
.fbtn{padding:0.5rem 1rem;border:1px solid var(--border);background:transparent;color:var(--dim);border-radius:100px;cursor:pointer;font-size:0.75rem;font-weight:600;transition:all 0.3s;font-family:inherit;letter-spacing:0.5px}
.fbtn:hover{border-color:var(--accent);color:var(--text)}
.fbtn.active{background:linear-gradient(135deg,var(--accent),var(--accent2));border-color:transparent;color:#fff;box-shadow:0 4px 15px rgba(139,92,246,0.3)}

.container{max-width:900px;margin:0 auto;padding:0 1.5rem 3rem}
.date-section{margin-bottom:2.5rem}
.date-label{display:flex;align-items:center;gap:0.8rem;margin-bottom:1rem;padding-bottom:0.8rem;border-bottom:1px solid var(--border)}
.date-label .day{font-size:2rem;font-weight:800;color:var(--accent)}
.date-label .info{display:flex;flex-direction:column}
.date-label .weekday{font-size:0.85rem;font-weight:600;color:var(--text)}
.date-label .month{font-size:0.7rem;color:var(--dim);text-transform:uppercase;letter-spacing:1px}

.match{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.2rem 1.5rem;margin-bottom:0.7rem;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:1rem;transition:all 0.3s;position:relative;overflow:hidden}
.match::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),var(--accent2),transparent);opacity:0;transition:opacity 0.3s}
.match:hover{border-color:rgba(139,92,246,0.3);background:var(--card-hover);transform:translateX(4px)}.match:hover::before{opacity:1}

.team{display:flex;align-items:center;gap:0.7rem;font-weight:600;font-size:0.9rem}
.team.away{flex-direction:row-reverse;text-align:right}
.flag{width:32px;height:22px;border-radius:4px;object-fit:cover;box-shadow:0 2px 8px rgba(0,0,0,0.3)}

.center{text-align:center;min-width:90px;display:flex;flex-direction:column;align-items:center;gap:4px}
.score{font-size:1.5rem;font-weight:800;letter-spacing:3px}
.vs{font-size:0.8rem;color:var(--dim);font-weight:600}
.time{font-size:0.7rem;color:var(--dim)}
.venue{font-size:0.65rem;color:var(--dim);opacity:0.7;margin-top:2px;max-width:120px}
.badge{font-size:0.6rem;padding:3px 8px;border-radius:100px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px}
.badge-group{background:rgba(139,92,246,0.15);color:var(--accent);border:1px solid rgba(139,92,246,0.3)}
.badge-live{background:rgba(239,68,68,0.15);color:var(--live);border:1px solid rgba(239,68,68,0.3);animation:blink 1.2s infinite}
.badge-done{background:rgba(16,185,129,0.15);color:var(--done);border:1px solid rgba(16,185,129,0.3)}
.badge-soon{background:rgba(59,130,246,0.1);color:var(--soon);border:1px solid rgba(59,130,246,0.2)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.4}}

.match.live-match{border-color:rgba(239,68,68,0.3);box-shadow:0 0 20px rgba(239,68,68,0.1)}

@media(max-width:640px){
  .header h1{font-size:1.8rem}
  .stats{grid-template-columns:repeat(2,1fr)}
  .match{grid-template-columns:1fr;text-align:center;gap:0.8rem}
  .team,.team.away{justify-content:center;flex-direction:row}
  .stat .val{font-size:1.5rem}
}
</style>
</head>

document.getElementById('filters').addEventListener('click',e=>{

  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));
  e.target.classList.add('active');
  render(e.target.dataset.g);
});

function render(filter='all'){
  const list=filter==='all'?F:F.filter(f=>f.g===filter);
  const byDate={};
  list.forEach(f=>(byDate[f.d]=byDate[f.d]||[]).push(f));
  
  document.getElementById('app').innerHTML=Object.entries(byDate).map(([date,matches])=>{
    const dt=new Date(date+'T12:00:00');
    const day=dt.getDate();
    const weekday=dt.toLocaleDateString('en-US',{weekday:'long'});
    const month=dt.toLocaleDateString('en-US',{month:'long',year:'numeric'});
    return `<div class="date-section">
      <div class="date-label">
        <div class="day">${day}</div>
        <div class="info"><span class="weekday">${weekday}</span><span class="month">${month}</span></div>

      ${matches.map(m=>`<div class="match${m.st==='live'?' live-match':''}">
        <div class="team home"><img class="flag" src="${flag(m.h)}" alt="" onerror="this.style.display='none'">${m.h}</div>
        <div class="center">
          ${m.s?`<div class="score">${m.s}</div>`:`<div class="vs">${m.t} ET</div>`}
          <span class="badge badge-${m.st}">${m.st==='live'?'● LIVE':m.st==='done'?'FT':'Upcoming'}</span>
          <span class="badge badge-group">${m.g==='Final'?'FINAL':'GRP '+m.g}</span>
          <div class="venue">📍 ${m.v}</div>
        </div>
        <div class="team away">${m.a}<img class="flag" src="${flag(m.a)}" alt="" onerror="this.style.display='none'"></div>
      </div>`).join('')}
