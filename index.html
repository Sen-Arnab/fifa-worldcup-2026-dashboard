<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIFA World Cup 2026 ⚽ Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#060610;--surface:#0d0d1a;--card:#13132a;--border:#1f1f3a;--accent:#7c3aed;--cyan:#06b6d4;--gold:#f59e0b;--text:#f1f5f9;--dim:#64748b;--live:#ef4444;--done:#10b981;--soon:#3b82f6}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 0%,rgba(124,58,237,0.08),transparent 50%),radial-gradient(ellipse at 80% 100%,rgba(6,182,212,0.06),transparent 50%);pointer-events:none}

.header{text-align:center;padding:2.5rem 1rem 1.5rem;position:relative}
.header h1{font-size:2.2rem;font-weight:900;letter-spacing:-1px;background:linear-gradient(135deg,#fff,#a78bfa,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header .sub{color:var(--dim);font-size:0.8rem;margin-top:0.3rem;letter-spacing:2px;text-transform:uppercase}
.hosts{display:flex;justify-content:center;gap:0.4rem;margin-top:0.6rem;font-size:1.3rem}

/* Navigation Tabs */
.nav{display:flex;justify-content:center;gap:0.3rem;padding:0.5rem 1rem;position:sticky;top:0;z-index:100;background:rgba(6,6,16,0.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.nav-btn{padding:0.6rem 1.2rem;border:none;background:transparent;color:var(--dim);font-size:0.8rem;font-weight:600;cursor:pointer;border-radius:8px;transition:all 0.3s;font-family:inherit}
.nav-btn:hover{color:var(--text);background:rgba(124,58,237,0.1)}
.nav-btn.active{color:#fff;background:var(--accent);box-shadow:0 4px 15px rgba(124,58,237,0.4)}

.section{display:none;max-width:1000px;margin:0 auto;padding:1.5rem}
.section.active{display:block}

/* Today's Matches - Hero */
.today-hero{background:linear-gradient(135deg,rgba(124,58,237,0.15),rgba(6,182,212,0.1));border:1px solid rgba(124,58,237,0.2);border-radius:20px;padding:1.5rem;margin-bottom:2rem}
.today-hero h2{font-size:1rem;color:var(--cyan);margin-bottom:1rem;display:flex;align-items:center;gap:0.5rem}
.today-match{background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:14px;padding:1.2rem;margin-bottom:0.6rem;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:1rem}
.today-match.is-live{border-color:rgba(239,68,68,0.4);box-shadow:0 0 25px rgba(239,68,68,0.1)}

/* Standings */
.group-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1rem}
.group-card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:all 0.3s}
.group-card:hover{border-color:var(--accent)}
.group-card h3{padding:0.8rem 1rem;font-size:0.8rem;color:var(--cyan);border-bottom:1px solid var(--border);font-weight:700;letter-spacing:1px;text-transform:uppercase}
.group-card table{width:100%;border-collapse:collapse;font-size:0.75rem}
.group-card th{text-align:left;padding:0.5rem 0.6rem;color:var(--dim);font-weight:600;font-size:0.65rem;text-transform:uppercase}
.group-card td{padding:0.5rem 0.6rem;border-top:1px solid rgba(255,255,255,0.03)}
.group-card tr:hover td{background:rgba(124,58,237,0.05)}
.team-cell{display:flex;align-items:center;gap:0.4rem}
.mini-flag{width:20px;height:14px;border-radius:2px;object-fit:cover}
.pts{font-weight:800;color:var(--gold)}
.gd-pos{color:var(--done)}
.gd-neg{color:var(--live)}

/* Top Scorers */
.scorer-list{display:flex;flex-direction:column;gap:0.5rem}
.scorer{display:flex;align-items:center;gap:1rem;padding:1rem 1.2rem;background:var(--card);border:1px solid var(--border);border-radius:12px;transition:all 0.3s}
.scorer:hover{border-color:var(--accent);transform:translateX(4px)}
.scorer-rank{font-size:1.5rem;font-weight:900;min-width:36px;background:linear-gradient(135deg,var(--accent),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.scorer-info{flex:1}
.scorer-name{font-weight:700;font-size:0.9rem}
.scorer-team{font-size:0.7rem;color:var(--dim);display:flex;align-items:center;gap:0.4rem;margin-top:2px}
.scorer-goals{font-size:1.4rem;font-weight:800;color:var(--gold)}
.scorer-goals span{font-size:0.6rem;color:var(--dim);font-weight:500}

/* Fixtures */
.fixture-filters{display:flex;gap:0.3rem;margin-bottom:1.5rem;overflow-x:auto;padding-bottom:0.5rem}
.fixture-filters::-webkit-scrollbar{display:none}
.ff-btn{padding:0.4rem 0.9rem;border:1px solid var(--border);background:transparent;color:var(--dim);border-radius:100px;cursor:pointer;font-size:0.7rem;font-weight:600;transition:all 0.2s;font-family:inherit;white-space:nowrap}
.ff-btn:hover{border-color:var(--accent);color:var(--text)}
.ff-btn.active{background:var(--accent);border-color:transparent;color:#fff}

.date-block{margin-bottom:2rem}
.date-head{font-size:0.8rem;color:var(--dim);padding:0.4rem 0;margin-bottom:0.6rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:0.5rem}
.date-head strong{color:var(--text);font-size:0.9rem}

.match{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1rem 1.2rem;margin-bottom:0.5rem;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:0.8rem;transition:all 0.2s}
.match:hover{border-color:rgba(124,58,237,0.3);background:rgba(19,19,42,0.8)}
.match.is-live{border-color:rgba(239,68,68,0.4);box-shadow:0 0 20px rgba(239,68,68,0.08)}

.team{display:flex;align-items:center;gap:0.5rem;font-weight:600;font-size:0.85rem}
.team.away{flex-direction:row-reverse;text-align:right}
.flag{width:28px;height:19px;border-radius:3px;object-fit:cover;box-shadow:0 1px 4px rgba(0,0,0,0.4)}
.center{text-align:center;min-width:80px;display:flex;flex-direction:column;align-items:center;gap:3px}
.score{font-size:1.3rem;font-weight:800;letter-spacing:3px}
.time-display{font-size:0.75rem;color:var(--dim);font-weight:500}
.badge{font-size:0.55rem;padding:2px 7px;border-radius:100px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px}
.b-live{background:rgba(239,68,68,0.15);color:var(--live);border:1px solid rgba(239,68,68,0.3);animation:blink 1.2s infinite}
.b-done{background:rgba(16,185,129,0.12);color:var(--done);border:1px solid rgba(16,185,129,0.25)}
.b-soon{background:rgba(59,130,246,0.1);color:var(--soon);border:1px solid rgba(59,130,246,0.2)}
.b-grp{background:rgba(124,58,237,0.12);color:#a78bfa;border:1px solid rgba(124,58,237,0.25);margin-top:2px}
.venue{font-size:0.6rem;color:var(--dim);margin-top:3px;opacity:0.7}
.events{grid-column:1/-1;padding-top:0.6rem;margin-top:0.6rem;border-top:1px solid var(--border);display:flex;flex-wrap:wrap;gap:0.4rem 1rem;justify-content:center}
.evt{font-size:0.65rem;display:flex;align-items:center;gap:3px;color:var(--dim)}
.evt .icon{font-size:0.7rem}
.evt .min{color:var(--accent);font-weight:600}
.evt-goal{color:var(--text)}
.evt-assist{color:var(--cyan)}
.evt-yc{color:#eab308}
.evt-rc{color:var(--live)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.4}}

/* Stats Overview */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:0.8rem;margin-bottom:2rem}
.stat-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1rem;text-align:center;transition:all 0.3s}
.stat-box:hover{border-color:var(--accent);box-shadow:0 0 20px rgba(124,58,237,0.1)}
.stat-box .n{font-size:1.8rem;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stat-box .l{font-size:0.65rem;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-top:0.2rem}

@media(max-width:640px){
  .header h1{font-size:1.6rem}
  .match,.today-match{grid-template-columns:1fr;text-align:center;gap:0.6rem}
  .team,.team.away{justify-content:center;flex-direction:row}
  .group-grid{grid-template-columns:1fr}
  .nav{overflow-x:auto;justify-content:flex-start}
  .stats-row{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>

// Tab Navigation
document.querySelector('.nav').addEventListener('click',e=>{
  if(!e.target.classList.contains('nav-btn'))return;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  e.target.classList.add('active');
  document.getElementById(e.target.dataset.tab).classList.add('active');
});

// Render Match Card
function matchHTML(m){
  let eventsHtml='';
  if(m.events&&m.events.length){
    eventsHtml=`<div class="events">${m.events.map(e=>{
      if(e.type==='goal')return `<span class="evt evt-goal"><span class="icon">⚽</span>${e.player} <span class="min">${e.min}</span>${e.assist?` <span class="evt-assist">(🅰️ ${e.assist})</span>`:''}</span>`;
      if(e.type==='yc')return `<span class="evt evt-yc"><span class="icon">🟨</span>${e.player} <span class="min">${e.min}</span></span>`;
      if(e.type==='rc')return `<span class="evt evt-rc"><span class="icon">🟥</span>${e.player} <span class="min">${e.min}</span></span>`;
      return '';
    }).join('')}</div>`;
  }
  return `<div class="match${m.st==='live'?' is-live':''}">
    <div class="team home"><img class="flag" src="${flag(m.h)}" onerror="this.style.display='none'">${m.h}</div>
    <div class="center">
      ${m.s?`<div class="score">${m.s}</div>`:`<div class="time-display">${m.t} ET</div>`}
      <span class="badge b-${m.st}">${m.st==='live'?'● LIVE':m.st==='done'?'FT':'Upcoming'}</span>
      <span class="badge b-grp">Group ${m.g}</span>
      <div class="venue">📍 ${m.v}</div>
    </div>
    <div class="team away">${m.a}<img class="flag" src="${flag(m.a)}" onerror="this.style.display='none'"></div>
    ${eventsHtml}
  </div>`;
}

document.getElementById('recent-results').innerHTML=fixtures.filter(f=>f.st==='done'||f.st==='live').map(matchHTML).join('');

// Fixtures with filters
const groups=[...new Set(fixtures.map(f=>f.g))];
document.getElementById('fix-filters').innerHTML=`<button class="ff-btn active" data-g="all">All</button>`+groups.map(g=>`<button class="ff-btn" data-g="${g}">Grp ${g}</button>`).join('');
document.getElementById('fix-filters').addEventListener('click',e=>{
  if(!e.target.classList.contains('ff-btn'))return;
  document.querySelectorAll('.ff-btn').forEach(b=>b.classList.remove('active'));
  e.target.classList.add('active');
  renderFixtures(e.target.dataset.g);
});

function renderFixtures(filter='all'){
  const list=filter==='all'?fixtures:fixtures.filter(f=>f.g===filter);
  const byDate={};
  list.forEach(f=>(byDate[f.d]=byDate[f.d]||[]).push(f));
  document.getElementById('fixtures-list').innerHTML=Object.entries(byDate).map(([d,ms])=>{
    const dt=new Date(d+'T12:00:00');
    return `<div class="date-block">
      <div class="date-head"><strong>${dt.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}</strong></div>
      ${ms.map(matchHTML).join('')}
    </div>`;
  }).join('');
}
renderFixtures();
